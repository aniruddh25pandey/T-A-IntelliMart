<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T&A IntelliMart - Premium Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #a855f7 100%);
      background-size: 400% 400%;
      animation: purpleShift 10s ease infinite;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    @keyframes purpleShift {
      0% { background-position: 0% 50%; }
      25% { background-position: 100% 50%; }
      50% { background-position: 100% 100%; }
      75% { background-position: 0% 100%; }
      100% { background-position: 0% 50%; }
    }

    .particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(255,255,255,0.6);
      border-radius: 50%;
      animation: float 8s infinite linear;
    }

    @keyframes float {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    .login-container {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      border-radius: 25px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.2);
      width: 800px;
      height: 520px;
      display: flex;
      overflow: hidden;
      position: relative;
      z-index: 10;
    }

    .left-panel {
      flex: 1;
      background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb);
      background-size: 400% 400%;
      animation: gradientShift 8s ease infinite;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 50px 30px;
      gap: 25px;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .product-showcase {
      display: flex;
      gap: 20px;
      align-items: center;
      animation: slideUp 3s ease-in-out infinite;
    }

    @keyframes slideUp {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }

    .product-item {
      width: 70px;
      height: 70px;
      border-radius: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.9);
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      backdrop-filter: blur(10px);
    }

    .product-item i {
      font-size: 1.8rem;
      margin-bottom: 4px;
    }

    .price-tag {
      background: #667eea;
      color: white;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 8px;
      box-shadow: 0 4px 12px rgba(102,126,234,0.4);
    }

    .analytics-chart {
      width: 140px;
      height: 80px;
      background: rgba(255,255,255,0.15);
      border-radius: 12px;
      position: relative;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.3);
    }

    .chart-bar {
      position: absolute;
      bottom: 10px;
      background: linear-gradient(135deg, #48dbfb, #667eea);
      border-radius: 4px 4px 0 0;
      animation: chartGrow 2s ease-out infinite;
    }

    .chart-bar:nth-child(1) { left: 15px; width: 12px; height: 40px; animation-delay: 0s; }
    .chart-bar:nth-child(2) { left: 35px; width: 16px; height: 55px; animation-delay: 0.3s; }
    .chart-bar:nth-child(3) { left: 55px; width: 14px; height: 45px; animation-delay: 0.6s; }
    .chart-bar:nth-child(4) { left: 75px; width: 18px; height: 65px; animation-delay: 0.9s; }
    .chart-bar:nth-child(5) { left: 95px; width: 15px; height: 50px; animation-delay: 1.2s; }

    @keyframes chartGrow {
      0% { height: 0; opacity: 0; }
      100% { opacity: 1; }
    }

    .right-panel {
      flex: 1.2;
      padding: 60px 50px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .logo {
      font-size: 2.6rem;
      font-weight: 700;
      background: linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3);
      background-size: 400% 400%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
      letter-spacing: -1px;
      animation: rainbow 3s linear infinite;
    }

    @keyframes rainbow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .subtitle {
      font-size: 1.25rem;
      color: #64748b;
      font-weight: 400;
      margin-bottom: 50px;
    }

    .input-group {
      position: relative;
      margin-bottom: 45px;
    }

    .input-field {
      width: 100%;
      padding: 20px 25px;
      font-size: 1.15rem;
      border: 2px solid #e2e8f0;
      border-radius: 16px;
      background: #f8fafc;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      font-weight: 500;
      font-family: 'Poppins', sans-serif;
    }

    .input-field:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
      transform: translateY(-2px);
      background: white;
    }

    .btn-group {
      display: flex;
      gap: 25px;
      margin-bottom: 50px;
    }

    .btn {
      flex: 1;
      padding: 18px 30px;
      border: none;
      border-radius: 16px;
      font-size: 1.15rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-customer {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }

    .btn-supplier {
      background: linear-gradient(135deg, #f093fb, #f5576c);
      color: white;
      box-shadow: 0 10px 30px rgba(240, 147, 251, 0.4);
    }

    .btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    }

    .btn:active {
      transform: translateY(-2px);
    }

    .login-action {
      text-align: center;
      font-weight: 600;
      font-size: 1.2rem;
      color: #475569;
      cursor: pointer;
      transition: color 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .login-action:hover {
      color: #667eea;
    }

    .login-arrow {
      font-size: 1.1rem;
      transition: transform 0.3s ease;
    }

    .login-action:hover .login-arrow {
      transform: translateX(5px);
    }

    @media (max-width: 768px) {
      .login-container {
        flex-direction: column;
        width: 100%;
        height: auto;
        border-radius: 20px;
      }
      .left-panel, .right-panel {
        padding: 40px 30px;
      }
      .logo {
        font-size: 2.2rem;
      }
      .btn-group {
        flex-direction: column;
        gap: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>

  <div class="login-container">
    <div class="left-panel">
      <div class="product-showcase">
        <div class="product-item">
          <i class="fas fa-mobile-alt" style="color: #667eea;"></i>
          <div class="price-tag">₹999</div>
        </div>
        <div class="product-item">
          <i class="fas fa-laptop" style="color: #f093fb;"></i>
          <div class="price-tag">₹45k</div>
        </div>
        <div class="product-item">
          <i class="fas fa-headphones" style="color: #48dbfb;"></i>
          <div class="price-tag">₹2.5k</div>
        </div>
      </div>
      
      <div class="analytics-chart">
        <div class="chart-bar"></div>
        <div class="chart-bar"></div>
        <div class="chart-bar"></div>
        <div class="chart-bar"></div>
        <div class="chart-bar"></div>
      </div>
    </div>

    <div class="right-panel">
      <h1 class="logo">T&A IntelliMart</h1>
      <p class="subtitle">Welcome to your pricing analysis dashboard</p>
      
      <div class="input-group">
        <input type="text" class="input-field" id="usernameInput" placeholder="Enter your username" required>
      </div>

      <div class="btn-group">
        <button class="btn btn-customer" onclick="customerLogin()">
          <i class="fas fa-user"></i> Customer
        </button>
        <button class="btn btn-supplier" onclick="supplierLogin()">
          <i class="fas fa-industry"></i> Supplier
        </button>
      </div>

      <div class="login-action">
        <span>Select your role to continue</span>
        <i class="fas fa-arrow-right login-arrow"></i>
      </div>
    </div>
  </div>

  <script>
    // Create animated particles
    function createParticles() {
      const particlesContainer = document.getElementById('particles');
      for (let i = 0; i < 60; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 8 + 's';
        particle.style.animationDuration = (Math.random() * 3 + 5) + 's';
        particlesContainer.appendChild(particle);
      }
    }

    // Get username from input
    function getUsername() {
      const username = document.getElementById('usernameInput').value.trim();
      if (!username) {
        alert('⚠️ Please enter your username first!');
        return null;
      }
      return username;
    }

    // Customer Login - Redirects to Customer Dashboard
    function customerLogin() {
      const username = getUsername();
      if (username) {
        localStorage.setItem('username', username);
        localStorage.setItem('userType', 'customer');
        window.location.href = 'customer-dashboard.html?username=' + encodeURIComponent(username);
      }
    }

    // Supplier Login - Redirects to Admin Dashboard
    function supplierLogin() {
      const username = getUsername();
      if (username) {
        localStorage.setItem('username', username);
        localStorage.setItem('userType', 'supplier');
        window.location.href = 'admin-dashboard.html?username=' + encodeURIComponent(username);
      }
    }

    // Initialize particles on page load
    createParticles();
  </script>
</body>
</html>
